<body>
    <nav>
        <div class="navbar">
            <h1>Markdown to PDF Converter</h1>
        </div>
    </nav>
    <div class="container">
        <div class="markdown-editor">
            <textarea id="markdown-input" placeholder="Enter your Markdown here..."></textarea>
        </div>
        <input type="file" id="file-upload" accept=".md">
        <button id="upload-button">Upload Markdown File</button>

        <!-- Add the "Convert to PDF" button here -->
        <button id="convert-button">Convert to PDF</button>
    </div>
    <script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "Markdown to PDF",
  "description": "Convert Markdown to PDF instantly with beautiful formatting. Professional document generation.",
  "applicationCategory": "DeveloperApplication",
  "operatingSystem": "Any",
  "offers": {
    "@type": "Offer",
    "price": "9",
    "priceCurrency": "USD"
  },
  "aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "4.8",
    "ratingCount": "100"
  }
}
</script>
  <script src="app.js"></script>
    <script>
        document.getElementById('convert-button').addEventListener('click', function () {
            const markdownContent = document.getElementById('markdown-input').value;

            fetch('/convert', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ markdownContent }),
            })
                .then(response => response.blob())
                .then(data => {
                    const blob = new Blob([data], { type: 'application/pdf' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'Markdown-to-PDF.pdf';
                    a.style.display = 'none';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                });
        });
    </script>

</body>
